name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
 deploy:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Debug registry from GitHub runner
      run: |
        echo "DNS:"
        nslookup cr.anikeen.cloud || true
    
        echo "Curl normal:"
        curl -v --connect-timeout 20 https://cr.anikeen.cloud/v2/ || true
    
        echo "Curl force HTTP/1.1:"
        curl --http1.1 -v --connect-timeout 20 https://cr.anikeen.cloud/v2/ || true
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: cr.anikeen.cloud
        username: k3s
        password: ${{ secrets.REGISTRY_PASSWORD }}
